name: geo_attend
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  lottie: ^3.3.1
  animated_text_kit: ^4.2.3
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.0
  tutorial_coach_mark: ^1.2.11

  flutter_foreground_task: ^8.17.0
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1

  # State Management & Storage
  get: ^4.7.2
  get_storage: ^2.1.1 # buat nyimpen token & role biar gak logout tiap buka app

  # Koneksi API & Keamanan Token
  dio: ^5.10.0
  flutter_secure_storage: ^10.3.1

  # Sensor Perangkat
  geolocator: ^10.1.0
  image_picker: ^1.2.3
  image_cropper: ^12.2.1

  # UI & Tipografi
  google_fonts: ^6.2.1
  font_awesome_flutter: ^11.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linter bawaan flutter
  flutter_lints: ^3.0.0

  # Package untuk ubah logo otomatis
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/

# ==========================================
# KONFIGURASI FLUTTER LAUNCHER ICONS
# ==========================================
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png" # sudah diarahkan ke icon baru kamu
